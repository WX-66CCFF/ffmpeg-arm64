name: Native Build Static FFmpeg (v4l2-request) for Armbian

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libdrm-dev libudev-dev pkg-config

      - name: Checkout FFmpeg Source
        uses: actions/checkout@v4
        with:
          # 核心修复：切换到全志 Cedrus 官方维护者 Jernej 的仓库，使用适配 FFmpeg 7.1 的无状态分支
          repository: jernejsk/FFmpeg
          ref: v4l2-request-n7.1

      - name: Configure FFmpeg (Static Build)
        run: |
          ./configure \
            --arch=aarch64 \
            --target-os=linux \
            --enable-v4l2-request \
            --enable-libdrm \
            --enable-libudev \
            --enable-gpl \
            --enable-nonfree \
            --disable-doc \
            --disable-shared \
            --enable-static \
            --pkg-config-flags="--static" \
            --extra-libs="-lpthread -lm -lz" \
            --prefix=/opt/ffmpeg-custom

      - name: Compile FFmpeg
        run: make -j$(nproc)

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          cp ffmpeg ffprobe output/

      - name: Upload FFmpeg Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-arm64-static
          path: output/
