name: Cross-compile FFmpeg (v4l2-request) for Armbian

on:
  workflow_dispatch: # 允许在 Actions 页面手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Set up arm64 cross-compilation environment
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          # 安装交叉编译工具链
          sudo apt-get install -y crossbuild-essential-arm64
          # 安装 arm64 架构的依赖库，这是 v4l2-request 必须的
          sudo apt-get install -y libdrm-dev:arm64 libudev-dev:arm64 pkg-config-aarch64-linux-gnu

      - name: Checkout FFmpeg Source
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: release/7.0 # 使用较新的稳定分支，确保包含完善的 v4l2-request 支持

      - name: Configure FFmpeg
        run: |
          # 告诉 pkg-config 去寻找 arm64 的库而不是宿主机的
          export PKG_CONFIG=aarch64-linux-gnu-pkg-config
          
          ./configure \
            --enable-cross-compile \
            --cross-prefix=aarch64-linux-gnu- \
            --arch=aarch64 \
            --target-os=linux \
            --enable-v4l2-request \
            --enable-libdrm \
            --enable-libudev \
            --enable-gpl \
            --enable-nonfree \
            --disable-doc \
            --disable-static \
            --enable-shared \
            --prefix=/opt/ffmpeg-custom

      - name: Compile FFmpeg
        # 使用 Actions 服务器的所有核心进行极速编译
        run: make -j$(nproc)

      - name: Prepare Artifacts
        run: |
          mkdir -p output/lib
          cp ffmpeg ffprobe output/
          # 如果依赖了特殊的动态库，可以稍后在这打包，这里先打包主程序

      - name: Upload FFmpeg Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-arm64-v4l2request
          path: output/
